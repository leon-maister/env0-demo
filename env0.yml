version: 1

deploy:
  steps:
    terraformPlan:
      before:
        - "echo '--- Step 1: Getting OIDC Token ---'"
        - |
          # 1. First, check the environment variable
          # 2. If empty, try to find it in the standard system path for OIDC/ID tokens
          if [ -z "$ENV0_OIDC_TOKEN" ]; then
            echo "Variable is empty. Looking for token in filesystem..."
            
            # Standard path for OIDC tokens in many containerized CI environments
            if [ -f "/var/run/secrets/env0/oidc/token" ]; then
              ENV0_OIDC_TOKEN=$(cat /var/run/secrets/env0/oidc/token)
              echo "Token found in env0 secrets path!"
            elif [ -f "$AWS_WEB_IDENTITY_TOKEN_FILE" ]; then
              ENV0_OIDC_TOKEN=$(cat "$AWS_WEB_IDENTITY_TOKEN_FILE")
              echo "Token found in AWS Web Identity path!"
            else
              echo "Error: OIDC token not found in environment or filesystem."
            fi
          fi

          # Now try to authenticate
          AUTH_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/auth" \
            -H "Content-Type: application/json" \
            -d "{\"access-id\":\"$AKEYLESS_JWT_ACCESS_ID\", \"jwt\":\"$ENV0_OIDC_TOKEN\", \"access-type\":\"jwt\"}")
          
          AKEYLESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token')
          
          if [ "$AKEYLESS_TOKEN" == "null" ] || [ -z "$AKEYLESS_TOKEN" ]; then
             echo "OIDC AUTH ERROR: $AUTH_RESPONSE"
             exit 1
          fi
          echo "Success: Authenticated with Akeyless!"

        - "echo '--- Step 2: Fetching Secret ---'"
        - |
          DATA_JSON=$(printf '{"names":["/MyFirstSecret"], "token":"%s"}' "$AKEYLESS_TOKEN")
          SECRET_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/get-secret-value" \
            -H "Content-Type: application/json" \
            -d "$DATA_JSON")
          
          SECRET_VAL=$(echo "$SECRET_RESPONSE" | jq -r '."/MyFirstSecret"')
          echo "Final Result - Secret Value: $SECRET_VAL"
