version: 1

deploy:
  steps:
    terraformPlan:
      before:
        - "echo '--- Step 1: Authentication ---'"
        - |
          # 1. Get Authentication Token
          AUTH_JSON=$(printf '{"access-id":"%s", "access-key":"%s", "access-type":"access_key"}' "$AKEYLESS_ACCESS_ID" "$AKEYLESS_ACCESS_KEY")
          
          AUTH_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/auth" \
            -H "Content-Type: application/json" \
            -d "$AUTH_JSON")
          
          AKEYLESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token')
          
          if [ "$AKEYLESS_TOKEN" == "null" ] || [ -z "$AKEYLESS_TOKEN" ]; then
            echo "AUTH ERROR: $AUTH_RESPONSE"
            exit 1
          fi
          echo "DEBUG: Token acquired successfully."

          # 2. Fetch Secret Value using the same shell session
          echo "--- Step 2: Fetching Secret Value ---"
          
          # Create JSON body safely using printf to avoid quote issues
          DATA_JSON=$(printf '{"names":["/MyFirstSecret"], "token":"%s"}' "$AKEYLESS_TOKEN")
          
          SECRET_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/get-secret-value" \
            -H "Content-Type: application/json" \
            -d "$DATA_JSON")
          
          SECRET_VAL=$(echo "$SECRET_RESPONSE" | jq -r '."/MyFirstSecret"')
          
          echo "Debug: API Response is $SECRET_RESPONSE"
          echo "Final Result - Secret Value: $SECRET_VAL"
