version: 1

deploy:
  steps:
    terraformPlan:
      before:
        - "echo '--- Fetching secrets from Akeyless via OIDC ---'"
        - |
          # 1. Exchange env0 OIDC token for an Akeyless session token
          AUTH_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/auth" \
            -H "Content-Type: application/json" \
            -d "{\"access-id\":\"$AKEYLESS_JWT_ACCESS_ID\", \"jwt\":\"$ENV0_OIDC_TOKEN\", \"access-type\":\"jwt\"}")
          
          AKEYLESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token')
          
          # Check if authentication was successful
          if [ "$AKEYLESS_TOKEN" == "null" ] || [ -z "$AKEYLESS_TOKEN" ]; then
            echo "Akeyless Authentication Failed!"
            echo "Response: $AUTH_RESPONSE"
            exit 1
          fi

          # 2. Fetch the secret value using the session token
          SECRET_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/get-secret-value" \
            -H "Content-Type: application/json" \
            -d "{\"names\":[\"/MyFirstSecret\"], \"token\":\"$AKEYLESS_TOKEN\"}")

          # 3. Extract the secret value from the response
          SECRET_VAL=$(echo "$SECRET_RESPONSE" | jq -r '."/MyFirstSecret"')

          if [ "$SECRET_VAL" == "null" ]; then
             echo "Failed to fetch secret value from Akeyless!"
             exit 1
          fi

          # 4. Success - mask the secret in logs and export for Terraform
          echo "::add-mask::$SECRET_VAL"
          export TF_VAR_my_first_secret=$SECRET_VAL
          
          echo "Success: Secret retrieved and exported to TF_VAR_my_first_secret"
