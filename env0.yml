version: 1

deploy:
  steps:
    terraformPlan:
      before:
        - "echo '--- Debug: ENV0 OIDC token presence ---'"
        - |
          echo "ENV0_OIDC_TOKEN length: ${#ENV0_OIDC_TOKEN}"
          if [ -z "$ENV0_OIDC_TOKEN" ]; then
            echo "ENV0_OIDC_TOKEN is EMPTY (OIDC not injected)"
            exit 1
          fi

        - "echo '--- Debug: OIDC token claims (iss/aud/sub/exp/iat) ---'"
        - |
          set -e

          b64url_decode () {
            local in="$1"
            # base64url -> base64
            in="${in//-/+}"
            in="${in//_//}"
            # add padding
            local mod=$(( ${#in} % 4 ))
            if [ $mod -eq 2 ]; then in="${in}=="
            elif [ $mod -eq 3 ]; then in="${in}="
            elif [ $mod -ne 0 ]; then
              echo "Invalid base64url length"
              return 1
            fi
            echo "$in" | base64 -d
          }

          PAYLOAD_B64=$(echo "$ENV0_OIDC_TOKEN" | cut -d "." -f2)
          PAYLOAD_JSON=$(b64url_decode "$PAYLOAD_B64" 2>/dev/null || true)

          if [ -z "$PAYLOAD_JSON" ]; then
            echo "Failed to decode JWT payload"
            exit 1
          fi

          echo "$PAYLOAD_JSON" | jq '{iss, aud, sub, exp, iat}'

        - "echo '--- Step 1: OIDC Auth to Akeyless ---'"
        - |
          AUTH_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/auth" \
            -H "Content-Type: application/json" \
            -d "{\"access-id\":\"$AKEYLESS_JWT_ACCESS_ID\", \"jwt\":\"$ENV0_OIDC_TOKEN\", \"access-type\":\"jwt\"}")

          AKEYLESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token')

          if [ "$AKEYLESS_TOKEN" = "null" ] || [ -z "$AKEYLESS_TOKEN" ]; then
            echo "AUTH ERROR: $AUTH_RESPONSE"
            exit 1
          fi

          echo "Akeyless auth OK (token received)"

        - "echo '--- Step 2: Fetching Secret from Akeyless ---'"
        - |
          DATA_JSON=$(printf '{"names":["/MyFirstSecret"], "token":"%s"}' "$AKEYLESS_TOKEN")

          SECRET_RESPONSE=$(curl -s -X POST "https://api.akeyless.io/get-secret-value" \
            -H "Content-Type: application/json" \
            -d "$DATA_JSON")

          SECRET_VAL=$(echo "$SECRET_RESPONSE" | jq -r '."/MyFirstSecret"')

          if [ "$SECRET_VAL" = "null" ] || [ -z "$SECRET_VAL" ]; then
            echo "GET SECRET ERROR: $SECRET_RESPONSE"
            exit 1
          fi

          echo "Final Result - Secret Value: $SECRET_VAL"
