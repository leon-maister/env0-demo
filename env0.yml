version: 1

deploy:
  steps:
    terraformPlan:
      before:
        - echo "Native OIDC authentication initiated..."
        - echo "Checking for VAULT_TOKEN environment variable..."
        - |
          if [ -z "$VAULT_TOKEN" ]; then
            echo "ERROR: VAULT_TOKEN is missing. Check your Project Credentials settings!"
          else
            echo "VAULT_TOKEN is present. Ready to fetch secrets."
          fi
