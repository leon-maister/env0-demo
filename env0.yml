version: 1

deploy:
  steps:
    terraformPlan:
      before:
        - echo "--- Fetching Akeyless Token ---"
        # 1. retrieve t-token
        - |
          AKEYLESS_TOKEN=$(curl -s -X POST "https://api.akeyless.io/auth" \
          -d "{\"access-id\":\"$AKEYLESS_ACCESS_ID\", \"access-key\":\"$AKEYLESS_ACCESS_KEY\"}" \
          | jq -r '.token')
        
        - echo "--- Fetching Secret Value ---"
        # 2. Retrieve the secret
        - |
          SECRET_VAL=$(curl -s -X POST "https://api.akeyless.io/get-secret-value" \
          -d "{\"name\":\"/MyFirstSecret\", \"token\":\"$AKEYLESS_TOKEN\"}" \
          | jq -r '.value')
          
          echo "Secret fetched successfully!"
          echo "Value is: $SECRET_VAL"
